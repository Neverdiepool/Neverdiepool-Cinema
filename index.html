<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>illerVerse Cinema</title>

  <style>
    :root {
      --bg: #0a0a0f;
      --text: #ffffff;
      --muted-text: #b3b3b3;
      --accent: #7f5cff;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 1200px;
      padding: 20px;
    }

    /* Title Block */
    .title-block {
      text-align: center;
      margin-bottom: 20px;
    }

    .title-image {
      width: 260px;
      transform: rotate(-3deg);
    }

    /* Catalog Subtitle — restored + aligned */
    .catalog-header {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding-left: 10px;
      display: flex;
      justify-content: flex-start;
    }

    .site-subtitle {
      font-size: 0.9rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted-text);
      margin-bottom: 10px;
      text-align: left;
    }

    /* Header / Discord */
    .header {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .discord-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #5865f2;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: bold;
    }

    .discord-icon {
      width: 16px;
      height: 16px;
      background: white;
      mask: url('images/discord.svg') no-repeat center;
      -webkit-mask: url('images/discord.svg') no-repeat center;
    }

    /* Poster Grid */
    .poster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }

    .poster-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
    }

    .poster-image {
      width: 100%;
      display: block;
    }

    .poster-number {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: white;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      color: var(--muted-text);
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="title-block">
      <img src="images/illerVerse.png" alt="illerVerse Cinema" class="title-image">
    </div>

    <div class="catalog-header">
      <h2 class="site-subtitle">Catalog</h2>
    </div>

    <header class="header">
      <a
        class="discord-link"
        href="https://discord.gg/vpq26ScgUd"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="discord-icon"></span>
        <span>Discord</span>
      </a>
    </header>

    <main>
      <section class="poster-grid">

        <article class="poster-card" data-number="1">
          <div class="poster-number">#1</div>
          <img class="poster-image" src="images/poster-01.jpg" alt="Black Bird" />
        </article>

        <article class="poster-card" data-number="2">
          <div class="poster-number">#2</div>
          <img class="poster-image" src="images/poster-02.jpg" alt="Movie 2" />
        </article>

        <article class="poster-card" data-number="3">
          <div class="poster-number">#3</div>
          <img class="poster-image" src="images/poster-03.jpg" alt="Movie 3" />
        </article>

        <article class="poster-card" data-number="4">
          <div class="poster-number">#4</div>
          <img class="poster-image" src="images/poster-04.jpg" alt="Movie 4" />
        </article>

        <article class="poster-card" data-number="5">
          <div class="poster-number">#5</div>
          <img class="poster-image" src="images/poster-05.jpg" alt="Movie 5" />
        </article>

      </section>

      <div class="footer">
        illerVerse • illerFlix • Neverdiepool
      </div>
    </main>

  </div>
</body>
</html>
