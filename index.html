<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>illerVerse Cinema</title>

  <style>
  :root {
    --bg: #0a0a0f;
    --text: #ffffff;
    --muted-text: #b3b3b3;
    --accent: #7f5cff;
    --blue: #00b7ff;

    --glow-1: rgba(127, 92, 255, 0.45);
    --glow-2: rgba(0, 183, 255, 0.35);
  }

  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a1035, #0a0a0f 60%);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: pageFade 0.8s ease forwards;
    overflow-x: hidden;
  }

  @keyframes pageFade { to { opacity: 1; } }

  .page {
    width: 100%;
    max-width: 1200px;
    padding: 20px;
    position: relative;
    z-index: 3;
  }

  .poster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 30px 26px;
    padding: 20px;
  }

  .poster-card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
  }

  .poster-number {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.75);
    color: var(--blue);
    border: 1px solid var(--accent);
    font-size: 0.8rem;
  }

  .poster-image {
    width: 100%;
    border-radius: 10px;
  }

  .poster-info {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  }

  .info-title {
    margin: 0;
    font-size: 1rem;
  }

  .info-details {
    font-size: 0.8rem;
    color: var(--muted-text);
  }
  </style>
</head>

<body>

<div class="page">

  <div class="top-row">
    <h2 class="site-subtitle">Cinema</h2>

    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search..." />
    </div>
  </div>

  <section class="poster-grid">

    <article class="poster-card" data-number="1">
      <div class="poster-number">#1</div>
      <img class="poster-image" src="images/poster-01.jpg" alt="Black Bird" />
      <div class="poster-info">
        <h3 class="info-title">Black Bird</h3>
        <div class="info-details">
          <span class="year">2022</span> • R • ★★★★★
        </div>
      </div>
    </article>

  </section>

  <div class="footer">
    illerVerse • illerFlix • Neverdiepool
  </div>

</div>

<script>
document.getElementById("searchInput").addEventListener("input", function () {
  const query = this.value.toLowerCase();
  const cards = document.querySelectorAll(".poster-card");

  cards.forEach(card => {
    const title = card.querySelector(".info-title")?.textContent.toLowerCase() || "";
    const year = card.querySelector(".year")?.textContent.toLowerCase() || "";
    const number = card.dataset.number || "";

    const combined = `${title} ${year} ${number}`.toLowerCase();

    card.style.display = combined.includes(query) ? "block" : "none";
  });
});
</script>

</body>
</html>
