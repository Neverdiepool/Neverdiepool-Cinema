<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>illerVerse Cinema</title>

  <style>
  :root {
    --bg: #0a0a0f;
    --text: #ffffff;
    --muted-text: #b3b3b3;
    --accent: #7f5cff;
    --blue: #00b7ff;
  }

  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a1035, #0a0a0f 60%);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: pageFade 0.8s ease forwards;
  }

  @keyframes pageFade { to { opacity: 1; } }

  .page {
    width: 100%;
    max-width: 1200px;
    padding: 20px;
  }

  .title-block {
    text-align: center;
    margin-bottom: 20px;
  }

  .title-image {
    width: 420px;
    transform: rotate(-3deg);
    filter: drop-shadow(0 0 12px var(--accent));
    opacity: 0;
    animation: logoFade 0.8s ease forwards;
  }

  @keyframes logoFade { to { opacity: 1; } }

  .top-row {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto 55px; /* FIXED SPACING */
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .site-subtitle {
    font-size: 1rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted-text);
    opacity: 0.9;
    margin: 0;
  }

  .search-container {
    flex: 1;
    display: flex;
    justify-content: center;
  }

    width: 100%;
    max-width: 360px;
    padding: 10px 14px;

    border: 1.5px solid rgba(127, 92, 255, 0.35);

    color: white;
    font-size: 1rem;
    box-shadow: 0 0 8px rgba(127, 92, 255, 0.18);
    outline: none;
    transition: 0.25s ease;
  }

    border-color: #a78bff;
    box-shadow: 0 0 14px rgba(157, 122, 255, 0.45);
  }
